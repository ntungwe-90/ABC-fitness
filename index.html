<!doctype html>
<html>
  <head>
    <title>ABC Fitness Studio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>

  <body>
    <header>
      <div class="logo">ABC Fitness Studio</div>

      <nav>
        <a href="index.html">Homepage</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About Us</a>
        <a href="custom.html">Custom Orders</a>
      </nav>
    </header>

    <section class="hero">
      <div>
        <h1>Transform Your Fitness Journey</h1>
        <p>Premium equipment and personalized workout plans</p>

        <button class="btn" onclick="viewCart()">View Cart</button>
      </div>
    </section>

    <section class="container">
      <h2>Fitness Highlights</h2>

      <div class="grid">
        <div class="card"><img src="images/gym1.jpg" alt="gym" /></div>
        <div class="card"><img src="images/gym2.jpg" alt="gym" /></div>
        <div class="card"><img src="images/gym3.jpg" alt="gym" /></div>
      </div>

      <div class="promo">
        <h3>Special Promotion</h3>

        <p>Join our fitness community today.</p>

        <button class="btn">Join Now</button>
      </div>
    </section>

    <section class="newsletter">
      <h2>Stay Connected</h2>

      <input type="email" id="email" placeholder="Enter your email" />

      <button onclick="subscribe()">Subscribe</button>
    </section>

    <footer>
      <p>© 2026 ABC Fitness Studio</p>
    </footer>
  </body>
</html>
