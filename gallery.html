<!doctype html>
<html>
  <head>
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>

  <body>
    <header>
      <div class="logo">ABC Fitness Studio</div>

      <nav>
        <a href="index.html">Homepage</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About Us</a>
        <a href="custom.html">Custom Orders</a>
      </nav>
    </header>

    <section class="container">
      <h2>Fitness Equipment</h2>

      <div class="grid">
        <div class="card">
          <img src="images/dumbbells.jpg" alt="dumbbells" />

          <h3>Dumbbells</h3>

          <p>$35</p>

          <button class="btn" onclick="addToCart('Dumbbells', 35)">
            Add to Cart
          </button>
        </div>

        <div class="card">
          <img src="images/yogamat.jpg" alt="yoga mat" />

          <h3>Yoga Mat</h3>

          <p>$20</p>

          <button class="btn" onclick="addToCart('Yoga Mat', 20)">
            Add to Cart
          </button>
        </div>

        <div class="card">
          <img src="images/kettlebell.jpg" alt="kettlebell" />

          <h3>Kettlebell</h3>

          <p>$45</p>

          <button class="btn" onclick="addToCart('Kettlebell', 45)">
            Add to Cart
          </button>
        </div>
      </div>

      <br />

      <button class="btn" onclick="viewCart()">View Cart</button>

      <button class="btn" onclick="clearCart()">Clear Cart</button>
    </section>

    <footer>
      <p>© 2026 ABC Fitness Studio</p>
    </footer>
  </body>
</html>
